<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARKET ΠΑΠΙΛΙΑΣ</title>
    <style>
        :root { --red: #e63946; --navy: #1d3557; --gold: #ffb703; }
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .card { background: white; width: 320px; padding: 40px 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 10px solid var(--gold); position: relative; }
        h1 { color: var(--navy); margin: 0 0 5px 0; font-size: 24px; letter-spacing: -0.5px; }
        .sub-title { color: #adb5bd; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; margin-bottom: 25px; display: block; }
        .promo-box { background: #fffcf2; border: 2px dashed var(--gold); border-radius: 15px; padding: 20px; margin: 20px auto; color: #856404; font-weight: bold; width: 260px; box-sizing: border-box; }
        .promo-box .small-text { font-weight: normal; font-size: 11px; display: block; margin-top: 5px; color: #6c757d; }
        .mic-btn { background: var(--red); color: white; border: none; width: 110px; height: 110px; border-radius: 50%; font-size: 55px; cursor: pointer; box-shadow: 0 8px 25px rgba(230,57,70,0.4); outline: none; transition: transform 0.1s; }
        .mic-btn:active { transform: scale(0.95); }
        p.action-text { color: var(--navy); font-weight: bold; margin-top: 25px; font-size: 16px; line-height: 1.4; }
        .footer { margin-top: 40px; font-size: 13px; color: #adb5bd; border-top: 1px solid #f1f3f5; padding-top: 20px; }
        .footer a { color: #457b9d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>MARKET ΠΑΠΙΛΙΑΣ</h1>
        <span class="sub-title">ΨΗΦΙΑΚΗ ΠΑΡΑΓΓΕΛΙΑ</span>
        
        <div class="promo-box">
            ΔΩΡΕΑΝ ΔΙΑΝΟΜΗ
            <span class="small-text">ΕΝΤΟΣ ΩΡΑΡΙΟΥ ΚΑΤΑΣΤΗΜΑΤΟΣ</span>
        </div>
        
        <button class="mic-btn" onclick="location.href='https://wa.me/306972101928?text=Γεια σας, θα ήθελα να κάνω μια παραγγελία'">🎤</button>
        
        <p class="action-text">ΠΑΤΗΣΤΕ ΤΟ ΚΟΥΜΠΙ<br>ΓΙΑ ΣΥΝΔΕΣΗ ΣΤΟ WHATSAPP</p>
        
        <div class="footer">
            ΨΗΦΙΑΚΟΣ ΠΛΟΗΓΟΣ<br>
            <a href="https://labeti.gr">labeti.gr</a>
        </div>
    </div>
</body>
</html>
