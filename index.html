<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET ΠΑΠΙΛΙΑΣ - Online</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 1em; margin-bottom: 15px; transition: all 0.5s; }
        .open { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .closed { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        h1 { margin: 10px 0; font-size: 1.8em; }
        .promo-box { background-color: #fff3cd; border-left: 5px solid #ffeeba; padding: 15px; margin: 20px 0; border-radius: 8px; text-align: left; min-height: 50px; }
        .promo-title { font-weight: bold; color: #856404; display: block; margin-bottom: 5px; }
        .mic-button { background-color: #e63946; color: white; border: none; padding: 25px; border-radius: 50%; font-size: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(230, 57, 70, 0.4); }
        .mic-button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
        .lab-footer { margin-top: 30px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <div id="status" class="status-badge">Φόρτωση...</div>
        <h1>MARKET ΠΑΠΙΛΙΑΣ</h1>
        
        <div class="promo-box">
            <span class="promo-title">📢 Ενημέρωση:</span>
            <div id="promo-text">Παρακαλώ περιμένετε...</div>
        </div>

        <p id="instruction">Πατήστε το μικρόφωνο για παραγγελία</p>
        <button id="micBtn" class="mic-button" onclick="startOrder()">🎤</button>
        
        <div class="lab-footer">Ένα ψηφιακό εργαλείο του <a href="https://labeti.gr" style="color:#007bff; text-decoration:none;">labeti.gr</a></div>
    </div>

    <script>
        // Ο Σύνδεσμος της Γέφυρας
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJsjXjceO8jeeNU7KVyHWwr_koZlPhgLfZ61mh1TmAFfNzzr5z5PmfK5nfe2_BBR9Zj_SQGJT4CZJ/pub?output=tsv";

        async function updatePage() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split('\t'));

                const status = rows[0][1].trim().toUpperCase(); // Κελί B1
                const promo = rows[1][1].trim(); // Κελί B2

                const statusDiv = document.getElementById('status');
                const promoDiv = document.getElementById('promo-text');
                const micBtn = document.getElementById('micBtn');
                const instruct = document.getElementById('instruction');

                promoDiv.innerText = promo;

                if (status === "ΑΝΟΙΧΤΟ") {
                    statusDiv.innerText = "● ΚΑΤΑΣΤΗΜΑ ΑΝΟΙΧΤΟ";
                    statusDiv.className = "status-badge open";
                    micBtn.disabled = false;
                    instruct.innerText = "Πατήστε το μικρόφωνο για παραγγελία";
                } else {
                    statusDiv.innerText = "○ ΚΑΤΑΣΤΗΜΑ ΚΛΕΙΣΤΟ";
                    statusDiv.className = "status-badge closed";
                    micBtn.disabled = true;
                    instruct.innerText = "Είμαστε κλειστά. Δοκιμάστε αργότερα!";
                }
            } catch (error) {
                console.error("Σφάλμα σύνδεσης:", error);
            }
        }

        function startOrder() {
            const phone = "306945381831";
            const message = encodeURIComponent("Γεια σας! Θα ήθελα να κάνω μια παραγγελία από το MARKET ΠΑΠΙΛΙΑΣ.");
            window.location.href = `https://wa.me/${phone}?text=${message}`;
        }

        // Ενημέρωση κάθε 30 δευτερόλεπτα
        updatePage();
        setInterval(updatePage, 30000);
    </script>
</body>
</html>
