<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET ΠΑΠΙΛΙΑΣ</title>
    <style>
        :root { --red: #e63946; --green: #2a9d8f; --gold: #ffb703; --navy: #1d3557; }
        body { font-family: sans-serif; background: #f8f9fa; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .badge { display: inline-block; padding: 10px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; font-size: 0.9em; }
        .open { background: #d4edda; color: #155724; }
        .closed { background: #f8d7da; color: #721c24; }
        .promo { background: #fff3cd; border: 2px dashed #ffeeba; padding: 20px; margin: 20px 0; border-radius: 15px; }
        .btn { background: var(--red); color: white; border: none; width: 100px; height: 100px; border-radius: 50%; font-size: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div id="st" class="badge open">ΣΥΝΔΕΣΗ...</div>
        <h1 style="color: var(--navy);">MARKET ΠΑΠΙΛΙΑΣ</h1>
        <div class="promo">
            <div id="pr">Φορτώνει...</div>
        </div>
        <button id="bt" class="btn" onclick="location.href='https://wa.me/306972101928'">🎤</button>
        <p><b>Πατήστε για παραγγελία</b></p>
    </div>

    <script>
        const U = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJsjXjceO8jeeNU7KVyHWwr_koZlPhgLfZ61mh1TmAFfNzzr5z5PmfK5nfe2_BBR9Zj_SQGJT4CZJ/pub?output=tsv";
        async function sync() {
            try {
                const r = await fetch(U + "&cb=" + Date.now());
                const t = await r.text();
                const l = t.split(/\r?\n/);
                const s = l[0].split('\t')[1].trim().toUpperCase();
                const p = l[1].split('\t')[1].trim();
                document.getElementById('pr').innerText = p;
                const b = document.getElementById('st');
                if (s.includes("ΑΝΟΙΧΤΟ")) {
                    b.innerText = "● ΑΝΟΙΧΤΟ";
                    b.className = "badge open";
                    document.getElementById('bt').disabled = false;
                } else {
                    b.innerText = "○ ΚΛΕΙΣΤΟ";
                    b.className = "badge closed";
                    document.getElementById('bt').disabled = true;
                }
            } catch (e) { console.error(e); }
        }
        sync();
        setInterval(sync, 10000);
    </script>
</body>
</html>
