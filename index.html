<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET ΠΑΠΙΛΙΑΣ</title>
    <style>
        :root { --red: #e63946; --green: #2a9d8f; --gold: #ffb703; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .status-badge { display: inline-block; padding: 10px 25px; border-radius: 50px; font-weight: bold; font-size: 0.9em; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .open { background: #e9f5f2; color: var(--green); border: 1px solid var(--green); }
        .closed { background: #fdeaea; color: var(--red); border: 1px solid var(--red); }
        h1 { font-size: 2em; margin: 10px 0; color: #1d3557; }
        .promo-container { background: #fffcf2; border: 2px dashed var(--gold); border-radius: 15px; padding: 20px; margin: 25px 0; position: relative; }
        .promo-label { position: absolute; top: -12px; left: 20px; background: var(--gold); color: white; padding: 2px 10px; border-radius: 5px; font-size: 0.8em; font-weight: bold; }
        #promo-text { font-size: 1.1em; color: #444; line-height: 1.4; }
        .mic-btn { background: var(--red); color: white; border: none; width: 100px; height: 100px; border-radius: 50%; font-size: 50px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 20px rgba(230,57,70,0.3); margin-top: 10px; }
        .mic-btn:active { transform: scale(0.9); }
        .mic-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        .footer { margin-top: 40px; font-size: 0.75em; color: #adb5bd; }
        .footer a { color: #457b9d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="status-badge" class="status-badge open">ΕΝΗΜΕΡΩΣΗ...</div>
    <h1>MARKET ΠΑΠΙΛΙΑΣ</h1>
    
    <div class="promo-container">
        <span class="promo-label">ΠΡΟΣΦΟΡΑ</span>
        <div id="promo-text">Αναζήτηση προσφορών...</div>
    </div>

    <button id="main-btn" class="mic-btn" onclick="order()">🎤</button>
    <p id="hint" style="margin-top:15px; font-weight:500;">Πατήστε για παραγγελία</p>

    <div class="footer">
        ΨΗΦΙΑΚΟΣ ΠΛΟΗΓΟΣ: <a href="https://labeti.gr">LABETI.GR</a>
    </div>
</div>

<script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJsjXjceO8jeeNU7KVyHWwr_koZlPhgLfZ61mh1TmAFfNzzr5z5PmfK5nfe2_BBR9Zj_SQGJT4CZJ/pub?output=tsv";

    async function sync() {
        try {
            const r = await fetch(URL + "&nocache=" + Date.now());
            const t = await r.text();
            const lines = t.split('\n');
            const statusData = lines[0].split('\t')[1].trim();
            const promoData = lines[1].split('\t')[1].trim();

            const badge = document.getElementById('status-badge');
            const pText = document.getElementById('promo-text');
            const btn = document.getElementById('main-btn');
            const hint = document.getElementById('hint');

            pText.innerText = promoData;

            if (statusData.includes("ΑΝΟΙΧΤΟ")) {
                badge.innerText = "● ΚΑΤΑΣΤΗΜΑ ΑΝΟΙΧΤΟ";
                badge.className = "status-badge open";
                btn.disabled = false;
                hint.innerText = "Πατήστε για παραγγελία";
            } else {
                badge.innerText = "○ ΚΑΤΑΣΤΗΜΑ ΚΛΕΙΣΤΟ";
                badge.className = "status-badge closed";
                btn.disabled = true;
                hint.innerText = "Είμαστε κλειστά";
            }
        } catch (e) { console.log("Sync Error"); }
    }

    function order() {
        window.location.href = "https://wa.me/306945381831?text=" + encodeURIComponent("Γεια σας, θα ήθελα να παραγγείλω:");
    }

    sync();
    setInterval(sync, 20000);
</script>

</body>
</html>
