<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET ΠΑΠΙΛΙΑΣ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; }
        .open { background-color: #d4edda; color: #155724; }
        .closed { background-color: #f8d7da; color: #721c24; }
        .promo-box { background-color: #fff3cd; border-left: 5px solid #ffeeba; padding: 15px; margin: 20px 0; border-radius: 8px; text-align: left; }
        .mic-button { background-color: #e63946; color: white; border: none; padding: 25px; border-radius: 50%; font-size: 50px; cursor: pointer; box-shadow: 0 6px 20px rgba(230, 57, 70, 0.4); }
        .mic-button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="status" class="status-badge">Ενημέρωση...</div>
        <h1>MARKET ΠΑΠΙΛΙΑΣ</h1>
        <div class="promo-box">
            <span style="font-weight:bold; color:#856404;">📢 Προσφορά:</span>
            <div id="promo-text">Φορτώνει...</div>
        </div>
        <p id="instruction">Περιμένετε...</p>
        <button id="micBtn" class="mic-button" onclick="startOrder()">🎤</button>
        <div style="margin-top:30px; font-size:0.8em; color:#888;">labeti.gr</div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJsjXjceO8jeeNU7KVyHWwr_koZlPhgLfZ61mh1TmAFfNzzr5z5PmfK5nfe2_BBR9Zj_SQGJT4CZJ/pub?output=tsv";

        async function updatePage() {
            try {
                const response = await fetch(sheetUrl + '&cachebust=' + new Date().getTime());
                const data = await response.text();
                const lines = data.split('\n');
                const row1 = lines[0].split('\t');
                const row2 = lines[1].split('\t');

                const statusVal = row1[1].trim();
                const promoVal = row2[1].trim();

                document.getElementById('promo-text').innerText = promoVal;

                if (statusVal.includes("ΑΝΟΙΧΤΟ")) {
                    document.getElementById('status').innerText = "● ΚΑΤΑΣΤΗΜΑ ΑΝΟΙΧΤΟ";
                    document.getElementById('status').className = "status-badge open";
                    document.getElementById('micBtn').disabled = false;
                    document.getElementById('instruction').innerText = "Πατήστε για παραγγελία";
                } else {
                    document.getElementById('status').innerText = "○ ΚΑΤΑΣΤΗΜΑ ΚΛΕΙΣΤΟ";
                    document.getElementById('status').className = "status-badge closed";
                    document.getElementById('micBtn').disabled = true;
                    document.getElementById('instruction').innerText = "Είμαστε κλειστά";
                }
            } catch (e) { console.error(e); }
        }

        function startOrder() {
            window.location.href = "https://wa.me/306945381831";
        }

        updatePage();
        setInterval(updatePage, 10000); // Ενημέρωση κάθε 10 δευτερόλεπτα
    </script>
</body>
</html>
